<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesnik Eco-Home | Beautiful Essentials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              birch: '#F9F7F3',
              stone: '#E7E2D8',
              moss: '#4A5F4F',
              forest: '#0D0D0D',
              reed: '#A6A6A6',
              sage: '#C4D6C6',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Lora', 'serif'],
            },
            transitionTimingFunction: {
              'quart': 'cubic-bezier(0.165, 0.84, 0.44, 1)',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'fade-up': 'fadeUp 1.2s cubic-bezier(0.165, 0.84, 0.44, 1) forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #F9F7F3;
        color: #0D0D0D;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      /* Hide scrollbar for clean horizontal scroll */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Reveal Animation Utilities */
      .reveal-container {
        overflow: hidden;
        display: block;
      }
      .reveal-text {
        transform: translateY(110%);
        transition: transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        display: block;
      }
      .reveal-text.visible {
        transform: translateY(0);
      }
      
      .image-scale-container {
        overflow: hidden;
      }
      .image-scale {
        transform: scale(1.15);
        transition: transform 1.5s cubic-bezier(0.165, 0.84, 0.44, 1);
      }
      .image-scale.visible {
        transform: scale(1);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
